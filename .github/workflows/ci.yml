name: Feature branch workflow

on:
  push:
    branches-ignore:
      - main

env:  
  GO_VERSION: 1.26

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-go@v6 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Setup config
        run: cp configs/config.example.yaml configs/config.yaml

      - name: Lint
        uses: golangci/golangci-lint-action@v9 # v9.0.0
        with:
          version: latest

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-go@v6 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: make build

  docker-build:
    uses: ./.github/workflows/docker.yml
    needs: ["go-lint", "go-build"]
    permissions:
      id-token: write
      packages: write
      contents: read
    with:
      with-push: false